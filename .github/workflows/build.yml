# [INPUT]: 依赖 SwiftPM、Scripts/build-app.sh、docs/releases/vX.Y.Z.md 与 GitHub CLI release 能力。
# [OUTPUT]: push/PR 验证 build+test，workflow_dispatch/tag 生成 Desktop-Cleaner.zip，tag 自动发布 GitHub Release。
# [POS]: GitHub Actions 的唯一主工作流，把测试、打包、发布串成可复现流水线。
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md

name: Build DeskMagnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app target
        run: swift build --product DeskMagnetApp

      - name: Run tests
        run: swift test

  package_macos:
    name: Package macOS app
    runs-on: macos-15
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build signed app bundle
        run: Scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 "build/桌面清理大师.app"

      - name: Archive app bundle
        run: |
          rm -rf dist
          mkdir -p dist
          ditto -c -k --keepParent "build/桌面清理大师.app" "dist/Desktop-Cleaner.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Cleaner-macOS
          path: dist/Desktop-Cleaner.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "dist/Desktop-Cleaner.zip" \
            --title "桌面清理大师 ${GITHUB_REF_NAME}" \
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
