name: Build DeskMagnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app target
        run: swift build --product DeskMagnetApp

      - name: Run tests
        run: swift test

  package_macos:
    name: Package macOS app
    runs-on: macos-15
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build signed app bundle
        run: Scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 "build/桌面清理大师.app"

      - name: Archive app bundle
        run: |
          rm -rf dist
          mkdir -p dist
          ditto -c -k --keepParent "build/桌面清理大师.app" "dist/桌面清理大师.app.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: 桌面清理大师-macOS
          path: dist/桌面清理大师.app.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "dist/桌面清理大师.app.zip#桌面清理大师.app.zip" \
            --title "桌面清理大师 ${GITHUB_REF_NAME}" \
            --notes-file "docs/releases/${GITHUB_REF_NAME}.md"
