name: Build DeskMagnet

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app target
        run: swift build --product DeskMagnetApp

      - name: Run tests
        run: swift test

  package_macos:
    name: Package macOS app
    runs-on: macos-15
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build signed app bundle
        run: Scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict --verbose=2 build/DeskMagnet.app

      - name: Archive app bundle
        run: |
          rm -rf dist
          mkdir -p dist
          ditto -c -k --keepParent build/DeskMagnet.app dist/DeskMagnet.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskMagnet-macOS
          path: dist/DeskMagnet.app.zip
          if-no-files-found: error
